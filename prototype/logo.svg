<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">

  <!-- Base body -->
  <rect x="18" y="118" width="164" height="58" rx="18" fill="white" stroke="#1d1d1f" stroke-width="7" stroke-linejoin="round"/>

  <!-- Base depth lines (stacked card effect on body) -->
  <line x1="26" y1="148" x2="174" y2="148" stroke="#1d1d1f" stroke-width="5" stroke-linecap="round"/>
  <line x1="26" y1="160" x2="174" y2="160" stroke="#1d1d1f" stroke-width="5" stroke-linecap="round"/>

  <!-- Left wheel -->
  <circle cx="22" cy="136" r="14" fill="white" stroke="#1d1d1f" stroke-width="7"/>

  <!-- Right wheel -->
  <circle cx="178" cy="136" r="14" fill="white" stroke="#1d1d1f" stroke-width="7"/>

  <!-- Feet left -->
  <rect x="42" y="166" width="28" height="18" rx="9" fill="white" stroke="#1d1d1f" stroke-width="7"/>

  <!-- Feet right -->
  <rect x="130" y="166" width="28" height="18" rx="9" fill="white" stroke="#1d1d1f" stroke-width="7"/>

  <!-- Lower card (front, below ring) -->
  <rect x="30" y="124" width="140" height="42" rx="12" fill="white" stroke="#1d1d1f" stroke-width="7"/>
  <!-- Lower card lines -->
  <line x1="50" y1="138" x2="150" y2="138" stroke="#1d1d1f" stroke-width="5" stroke-linecap="round"/>
  <line x1="50" y1="151" x2="150" y2="151" stroke="#1d1d1f" stroke-width="5" stroke-linecap="round"/>

  <!-- Ring axle bar -->
  <line x1="68" y1="122" x2="132" y2="122" stroke="#1d1d1f" stroke-width="7" stroke-linecap="round"/>

  <!-- Ring clip left -->
  <rect x="72" y="112" width="16" height="22" rx="5" fill="white" stroke="#1d1d1f" stroke-width="7"/>

  <!-- Ring clip right -->
  <rect x="112" y="112" width="16" height="22" rx="5" fill="white" stroke="#1d1d1f" stroke-width="7"/>

  <!-- Upper card -->
  <rect x="30" y="62" width="140" height="58" rx="12" fill="white" stroke="#1d1d1f" stroke-width="7"/>
  <!-- Upper card lines -->
  <line x1="50" y1="84" x2="150" y2="84" stroke="#1d1d1f" stroke-width="5" stroke-linecap="round"/>
  <line x1="50" y1="98" x2="150" y2="98" stroke="#1d1d1f" stroke-width="5" stroke-linecap="round"/>

  <!-- Tab A — outline only -->
  <rect x="42" y="40" width="34" height="26" rx="8" fill="white" stroke="#1d1d1f" stroke-width="7"/>
  <text x="59" y="59" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="800" fill="#1d1d1f" text-anchor="middle">A</text>

  <!-- Tab B — dark grey fill -->
  <rect x="83" y="34" width="34" height="30" rx="8" fill="#3a3a3c" stroke="#1d1d1f" stroke-width="7"/>
  <text x="100" y="55" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="800" fill="white" text-anchor="middle">B</text>

  <!-- Tab C — black fill -->
  <rect x="124" y="28" width="34" height="36" rx="8" fill="#1d1d1f" stroke="#1d1d1f" stroke-width="7"/>
  <text x="141" y="51" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="800" fill="white" text-anchor="middle">C</text>

</svg>
